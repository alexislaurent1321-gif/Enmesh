name: CI

on: [push, pull_request]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
        with:
          submodules: recursive

      - name: Configure
        run: cmake -B build 

      - name: Build
        run: cmake --build build

      - name: Test
        run: ctest --test-dir build --output-on-failure